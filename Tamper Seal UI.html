        const entries = JSON.parse(savedPreview);
        renderPreviewGrid(entries);
    } else {
        await fetchHierarchyData();
    }

    // Update the Realtime listener (around line 433)
    _supabase
        .channel('schema-db-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'Assets' }, (payload) => {
            if (!isEditMode && !isPreviewMode) { // Stop realtime from wiping preview
                fetchHierarchyData(true);
            }
        })
        .subscribe();
}

async function fetchHierarchyData(isSilent = false) {
    const container = document.getElementById('main-content-area');
    
    // 1. Capture State and Scroll Position
    const openAreas = new Set();
    const openAssets = new Set();
    const scrollPos = window.scrollY; // Capture current view point
    
    if (isSilent) {
        document.querySelectorAll('.area-container').forEach(areaDiv => {
            const content = areaDiv.querySelector('.area-content');
            if (content && !content.classList.contains('hidden')) {
                // Use trim() to ensure matching is exact
                const name = areaDiv.querySelector('.area-header span').innerText.replace('Area: ', '').trim();
                openAreas.add(name);
            }
        });
        document.querySelectorAll('.rows-container').forEach(rowsDiv => {
            if (!rowsDiv.classList.contains('hidden')) {
                openAssets.add(rowsDiv.getAttribute('data-asset-name'));
            }
        });
    } else {
        container.innerHTML = '<p style="text-align:center; padding:20px;">Scanning 10,000 entries for Areas and Assets...</p>';
    }

    let allRecords = [];
    let from = 0, to = 999, fetchMore = true;

    while (fetchMore && allRecords.length < 10000) {
        const { data, error } = await _supabase.from('Assets').select('*').range(from, to);
        if (error) {
            container.innerHTML = '<p style="text-align:center; color:red;">Error loading log hierarchy.</p>';
            return;
        }
        allRecords = allRecords.concat(data);
        if (data.length < 1000) fetchMore = false;
        else { from += 1000; to += 1000; }
    }

    allHierarchyRecords = allRecords;
    createFilterButtons();
    // Pass everything including scroll position to the renderer
    await renderFilteredLog(openAreas, openAssets, scrollPos);
}

function toggleFilter(type, value) {
    const filterSet = activeFilters[type];
    
    if (value === 'All') {
        filterSet.clear();
        filterSet.add('All');
    } else {
        filterSet.delete('All');
        if (filterSet.has(value)) {
            filterSet.delete(value);
        } else {
            filterSet.add(value);
        }
        // If nothing is selected, default back to All
        if (filterSet.size === 0) filterSet.add('All');
    }
    
    createFilterButtons();
    renderFilteredLog();
}

/**

 */
async function handleSearch(query) {

    await renderFilteredLog();

/**
 * Scans the visible UI for matching rows to populate navigation
 */
function updateMatchList() {
    const query = activeFilters.search;
    const counter = document.getElementById('matchCounter');
    
    if (!query) {
        matchElements = [];
        currentMatchIndex = -1;
        counter.innerText = "0/0";
        return;
    }

    // Collect all visible cell-rows as they represent the "instances"
    matchElements = Array.from(document.querySelectorAll('.cell-row'));
    currentMatchIndex = matchElements.length > 0 ? 0 : -1;
    
    updateMatchUI();
}

function updateMatchUI() {
    const counter = document.getElementById('matchCounter');
    
    // Remove previous highlights
    document.querySelectorAll('.highlight-match').forEach(el => el.classList.remove('highlight-match'));

    if (matchElements.length > 0 && currentMatchIndex !== -1) {
        counter.innerText = `${currentMatchIndex + 1}/${matchElements.length}`;
        const target = matchElements[currentMatchIndex];
        target.classList.add('highlight-match');
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    } else {
        counter.innerText = "0/0";
    }
}

function nextMatch() {
    if (matchElements.length === 0) return;
    currentMatchIndex = (currentMatchIndex + 1) % matchElements.length;
    updateMatchUI();
}

function prevMatch() {
    if (matchElements.length === 0) return;
    currentMatchIndex = (currentMatchIndex - 1 + matchElements.length) % matchElements.length;
    updateMatchUI();
}

/**
 * Updated renderFilteredLog to be async so we can wait for search-triggered data loads
 */
 async function renderFilteredLog(openAreas = new Set(), openAssets = new Set(), scrollPos = 0) {
    const container = document.getElementById('main-content-area');
    container.innerHTML = '';

    const targetLocs = activeFilters.locations;
    const targetStats = [...activeFilters.statuses].map(s => s.toLowerCase());
    const query = activeFilters.search;

    const uniqueAreas = [...new Set(allHierarchyRecords.map(r => (r.Location || r.location || 'Unassigned').trim()))].sort();
    const loadPromises = [];

    uniqueAreas.forEach(areaName => {
        if (!targetLocs.has('All') && !targetLocs.has(areaName)) return;

        const areaRecords = allHierarchyRecords.filter(r => (r.Location || r.location || 'Unassigned').trim() === areaName);
        const uniqueAssetNames = [...new Set(areaRecords.map(r => r.asset_name))].sort();

        let visibleAssetsInArea = 0;
        const areaContent = document.createElement('div');
        
        // REFRESH LOGIC: Keep area open if it was open before or if searching
        const isAreaOpen = query !== '' || openAreas.has(areaName);
        const isAreaHidden = isAreaOpen ? '' : 'hidden';
        areaContent.className = `area-content ${isAreaHidden}`;

        uniqueAssetNames.forEach(assetName => {
            let assetRecords = areaRecords.filter(r => r.asset_name === assetName);
            if (!activeFilters.statuses.has('All')) {
                assetRecords = assetRecords.filter(r => targetStats.some(f => (r.status || '').toLowerCase().includes(f)));
            }
            if (query !== '') {
                assetRecords = assetRecords.filter(r => {
                    const searchStr = `${r.asset_name} ${r.Location || r.location} ${r.seal_number} ${r.sub_area} ${r.inspection_notes} ${r.signoff}`.toLowerCase();
                    return searchStr.includes(query);
                });
            }
            if (assetRecords.length === 0) return;

            visibleAssetsInArea++;
            const assetDiv = document.createElement('div');
            assetDiv.className = 'asset-container';
            
            // REFRESH LOGIC: Keep asset open if it was open before or if searching
            const isAssetOpen = query !== '' || openAssets.has(assetName);
            const isRowsHidden = isAssetOpen ? '' : 'hidden';
            const arrow = isAssetOpen ? '▼' : '▶';

            assetDiv.innerHTML = `
                <div class="asset-header" onclick="toggleAsset(this, '${assetName}')">
                    <span>Asset: ${assetName}</span><span class="arrow">${arrow}</span>
                </div>
                <div class="rows-container ${isRowsHidden}" data-loaded="false" data-asset-name="${assetName}"></div>`;
            
            areaContent.appendChild(assetDiv);

            // Re-fetch data for assets that are open
            if (isAssetOpen) {
                const rowsDiv = assetDiv.querySelector('.rows-container');
                loadPromises.push(fetchAndRender(rowsDiv, assetName));
            }
        });

        if (visibleAssetsInArea > 0) {
            const areaDiv = document.createElement('div');
            areaDiv.className = 'area-container';
            const areaArrow = (query !== '' || openAreas.has(areaName)) ? '▼' : '▶';
            areaDiv.innerHTML = `<div class="area-header" onclick="toggleArea(this)"><span>Area: ${areaName}</span><span class="area-arrow">${areaArrow}</span></div>`;
            areaDiv.appendChild(areaContent);
            container.appendChild(areaDiv);
        }
    });

    if (loadPromises.length > 0) await Promise.all(loadPromises);
    if (scrollPos > 0) {
        window.scrollTo(0, scrollPos);
    }
}

async function toggleAsset(header, assetName) {
    const rowsDiv = header.nextElementSibling;
    const isHidden = rowsDiv.classList.toggle('hidden');
    header.querySelector('.arrow').innerText = isHidden ? '▶' : '▼';
    if (!isHidden && rowsDiv.getAttribute('data-loaded') === 'false') {
        await fetchAndRender(rowsDiv, assetName);
    }
}

async function fetchAndRender(container, assetName) {
    container.innerHTML = '<p style="padding:10px;">Loading up to 10,000 entries...</p>';
    
    let entries = [];
    let from = 0, to = 999, fetchMore = true;

    while (fetchMore && entries.length < 10000) {
        const { data, error } = await _supabase
            .from('Assets')
            .select('*')
            .eq('asset_name', assetName)
            .range(from, to);
            
        if (error) return;
        entries = entries.concat(data);
        if (data.length < 1000) fetchMore = false;
        else { from += 1000; to += 1000; }
    }

    let filteredData = entries;

    // 1. Apply multi-status filtering
    if (!activeFilters.statuses.has('All')) {
        const targetStats = [...activeFilters.statuses].map(s => s.toLowerCase());
        filteredData = filteredData.filter(r => {
            const s = (r.status || '').toLowerCase();
            return targetStats.some(filter => s.includes(filter));
        });
    }

    // 2. ADDED: Apply search filtering to individual rows
    const query = activeFilters.search;
    if (query !== '') {
        filteredData = filteredData.filter(r => {
            const searchStr = `${r.asset_name} ${r.Location || r.location} ${r.seal_number} ${r.sub_area} ${r.inspection_notes} ${r.signoff}`.toLowerCase();
            return searchStr.includes(query);
        });
    }

    // 3. Sort: Broken first
    filteredData.sort((a, b) => {
        const getP = (s) => (s||'').toLowerCase().includes('broken') ? 1 : (s||'').toLowerCase().includes('intact') ? 2 : 3;
        return getP(a.status) - getP(b.status);
    });

    container.innerHTML = '';
    renderEntries(container, filteredData);
    container.setAttribute('data-loaded', 'true');
}

async function deleteSelected() {
    const checkedRows = document.querySelectorAll('.row-selector:checked');
    if (checkedRows.length === 0) {
        alert("Please select at least one item to delete.");
        return;
    }

    if (!confirm(`Warning: This will permanently delete ${checkedRows.length} records. Continue?`)) return;

    const indicator = document.getElementById('saveIndicator');
    indicator.innerText = "Deleting...";

    // 1. Gather IDs and convert to Number to match Supabase int8 types
    const idsToDelete = Array.from(checkedRows).map(cb => {
        const id = cb.closest('.cell-row').dataset.id;
        return isNaN(id) ? id : Number(id); 
    });

    // 2. Perform the deletion in the database
    const { error } = await _supabase
        .from('Assets') 
        .delete()
        .in('id', idsToDelete); // Ensure your primary key column is lowercase 'id'

    if (error) {
        console.error("Supabase Delete Error:", error);
        alert(`Delete failed: ${error.message}. Make sure RLS allows Deletes for your table.`);
        indicator.innerText = "Error";
    } else {
        // 3. Remove from UI immediately
        checkedRows.forEach(cb => cb.closest('.cell-row').remove());
        
        // 4. Update local cache so re-renders don't bring them back
        allHierarchyRecords = allHierarchyRecords.filter(r => !idsToDelete.includes(Number(r.id)));
        
        indicator.innerText = "Deleted Successfully";
        setTimeout(() => indicator.innerText = "Synced", 2000);
    }
}

async function saveAllChanges() {
    const updatePromises = [];
    const indicator = document.getElementById('saveIndicator');

    for (const id in localEdits) {
        const changes = localEdits[id];
        if (Object.keys(changes).length === 0) continue;

        // We use 'location' (lowercase) to match the keys in syncEdit
        // and the previous successful payloads.
        updatePromises.push(
            _supabase.from('Assets').update(changes).eq('id', Number(id))
        );
    }

    if (updatePromises.length === 0) {
        return; 
    }

    const results = await Promise.all(updatePromises);
    const errors = results.filter(r => r.error);
    
    if (errors.length > 0) {
        console.error("Save Errors:", errors);
        alert("Failed to save some rows. Check console for details.");
    } else {
        localEdits = {}; 
        await fetchLookupData(); 
        await fetchHierarchyData(true); 
    }
}

/**
 * Captures edits in real-time to prevent data loss during search/navigation
 */
function syncEdit(id, field, value) {
    if (!id || id === "undefined") return; // Skip for preview mode
    if (!localEdits[id]) localEdits[id] = {};
    localEdits[id][field] = value;
}

function renderEntries(container, entries) {
    if (entries.length === 0) {
        container.innerHTML = '<p style="padding: 10px;">No matching records found.</p>';
        return;
    }
entries.forEach(entry => {
    const id = entry.id;
    const row = document.createElement('div');
    row.className = 'cell-row';
    row.dataset.id = id; 

    // Helper to check for existing local edits before using database values
    const getVal = (field, dbVal) => (localEdits[id] && localEdits[id][field] !== undefined) ? localEdits[id][field] : (dbVal || '');

    row.innerHTML = `
        <div class="edit-checkbox-cell">
            <input type="checkbox" class="row-selector">
        </div>
        
        <input class="edit-only-cell" list="asset-list" 
               oninput="syncEdit('${id}', 'asset_name', this.value)"
               value="${getVal('asset_name', entry.asset_name)}" ${!isEditMode ? 'readonly' : ''}>
        
        <input class="edit-only-cell" list="location-list" 
               oninput="syncEdit('${id}', 'location', this.value)"
               value="${getVal('location', entry.Location || entry.location)}" ${!isEditMode ? 'readonly' : ''}>
        
        <textarea oninput="syncEdit('${id}', 'sub_area', this.value)" ${!isEditMode ? 'readonly' : ''}>${getVal('sub_area', entry.sub_area)}</textarea>
        <textarea oninput="syncEdit('${id}', 'seal_number', this.value)" ${!isEditMode ? 'readonly' : ''}>${getVal('seal_number', entry.seal_number)}</textarea>
        <textarea oninput="syncEdit('${id}', 'inspection_date', this.value)" ${!isEditMode ? 'readonly' : ''}>${getVal('inspection_date', entry.inspection_date)}</textarea>
        <textarea oninput="syncEdit('${id}', 'signoff', this.value)" ${!isEditMode ? 'readonly' : ''}>${getVal('signoff', entry.signoff)}</textarea>
        <textarea oninput="syncEdit('${id}', 'inspection_notes', this.value)" ${!isEditMode ? 'readonly' : ''}>${getVal('inspection_notes', entry.inspection_notes)}</textarea>
        
        <select class="status-dropdown" onchange="syncEdit('${id}', 'status', this.value); applyStatusColor(this)" ${!isEditMode ? 'disabled' : ''}>
            <option value="${getVal('status', entry.status)}">${getVal('status', entry.status) || 'Select...'}</option>
            <option value="Intact">Intact</option>
            <option value="Broken">Broken</option>
            <option value="Removed">Removed</option>
        </select>
        
        <textarea oninput="syncEdit('${id}', 'break_date', this.value)" ${!isEditMode ? 'readonly' : ''}>${getVal('break_date', entry.break_date)}</textarea>
        <textarea oninput="syncEdit('${id}', 'responsible_party', this.value)" ${!isEditMode ? 'readonly' : ''}>${getVal('responsible_party', entry.responsible_party)}</textarea>
        <textarea oninput="syncEdit('${id}', 'break_reason', this.value)" ${!isEditMode ? 'readonly' : ''}>${getVal('break_reason', entry.break_reason)}</textarea>
    `;
    applyStatusColor(row.querySelector('.status-dropdown'));
    container.appendChild(row);
});
}

function applyStatusColor(el) {
    const row = el.closest('.cell-row');
    if (!row) return;
    const val = el.value.toLowerCase();
    row.classList.remove('row-intact', 'row-broken', 'row-removed');
    if (val.includes("intact") || val.includes("pass")) row.classList.add('row-intact');
    else if (val.includes("broken") || val.includes("fail")) row.classList.add('row-broken');
    else if (val.includes("removed") || val.includes("replaced") || val.includes("void")) row.classList.add('row-removed');
}

/**
 * Expands only the top-level Area/Zone containers.
 */
function expandAllZones() {
    document.querySelectorAll('.area-content').forEach(c => c.classList.remove('hidden'));
    document.querySelectorAll('.area-arrow').forEach(a => a.innerText = '▼');
}

/**
 * Expands all Areas and Assets, then triggers a data fetch for any
 * asset that hasn't been loaded yet.
 */
async function expandAll() {
    // 1. Visually expand everything first
    document.querySelectorAll('.area-content, .rows-container').forEach(c => c.classList.remove('hidden'));
    document.querySelectorAll('.area-arrow, .arrow').forEach(a => a.innerText = '▼');

    // 2. Identify all asset containers that haven't loaded data
    const containers = document.querySelectorAll('.rows-container');
    const loadPromises = [];

    containers.forEach(container => {
        if (container.getAttribute('data-loaded') === 'false') {
            const assetName = container.getAttribute('data-asset-name');
            if (assetName) {
                // Trigger the fetch and render process
                loadPromises.push(fetchAndRender(container, assetName));
            }
        }
    });

    // 3. Execute all loads in parallel for efficiency
    if (loadPromises.length > 0) {
        await Promise.all(loadPromises);
    }
}

/**
 * Collapses all levels back to the default state.
 */
function collapseAll() {
    document.querySelectorAll('.area-content, .rows-container').forEach(c => c.classList.add('hidden'));
    document.querySelectorAll('.area-arrow, .arrow').forEach(a => a.innerText = '▶');
}

// Add a global variable to track if we are in reinspection mode
let isReinspectionMode = false;
let selectedBrokenSeals = [];
let selectedBrokenSealIds = []; // NEW: Stores database IDs

/**
 * Updated: Reveal the "Next" button instead of the preview button
 */
async function loadBrokenSealsForAsset(assetName) {
    if (!assetName) return;
    const container = document.getElementById('brokenSealsContainer');
    const list = document.getElementById('sealCheckboxList');
    
    const { data, error } = await _supabase
        .from('Assets')
        .select('id, seal_number, location, sub_area')
        .eq('asset_name', assetName)
        .ilike('status', '%broken%');

    if (error || data.length === 0) {
        container.style.display = 'none';
        return;
    }

    container.style.display = 'block';
    // Show the Next button
    document.getElementById('reinspectNextBtn').style.display = 'inline-block';
    
    document.getElementById('brokenAssetSelect').dataset.location = data[0].location || '';
    document.getElementById('brokenAssetSelect').dataset.subarea = data[0].sub_area || '';

    list.innerHTML = data.map(s => `
        <div style="margin-bottom:5px;">
            <input type="checkbox" class="reinspect-seal-check" value="${s.id}" data-old-seal="${s.seal_number}">
            <label>Seal #${s.seal_number}</label>
        </div>
    `).join('');
}

/**
 * New Function: Pre-fills the standard form and moves the user there
 */
function proceedToStandardForm() {
    const checked = document.querySelectorAll('.reinspect-seal-check:checked');
    if (checked.length === 0) {
        alert("Please select at least one broken seal to replace.");
        return;
    }

    isReinspectionMode = true;
    // Capture Seal Numbers for the note
    selectedBrokenSeals = Array.from(checked).map(cb => cb.dataset.old_seal);
    // NEW: Capture Database IDs for the status update
    selectedBrokenSealIds = Array.from(checked).map(cb => cb.value); 

    // Pre-fill the standard form fields
    document.getElementById('newAsset').value = document.getElementById('brokenAssetSelect').value;
    document.getElementById('newLocation').value = document.getElementById('brokenAssetSelect').dataset.location;
    document.getElementById('newSubArea').value = document.getElementById('brokenAssetSelect').dataset.subarea;
    
    // Auto-generate a note about the replacement
    document.getElementById('newNotes').value = `Reinspection replacement for Seal(s): ${selectedBrokenSeals.join(', ')}`;

    // Transition to Step 2 (Standard Form)
    document.getElementById('step-reinspection').style.display = 'none';
    document.getElementById('step-standard').style.display = 'block';
    document.getElementById('modalTitle').innerText = "Add Replacement Seals";
}

function showAddModal() {
    isReinspectionMode = false;
    selectedBrokenSeals = [];
    
    // Open the modal and show Step 1 (The Choice screen)
    document.getElementById('addModal').style.display = 'flex';
    document.getElementById('step-choice').style.display = 'block';
    document.getElementById('step-standard').style.display = 'none';
    document.getElementById('step-reinspection').style.display = 'none';
    document.getElementById('modalTitle').innerText = "Add Tamper Seals";

    // 1. SET DATE TO TODAY
    // This ensures the date is fresh every time the form is opened
    document.getElementById('newDate').value = new Date().toISOString().split('T')[0];

    // 2. CLEAR OTHER INPUTS (Prevent data from the last session from showing)
    document.getElementById('newNotes').value = "";
    document.getElementById('startSeal').value = "";
    document.getElementById('endSeal').value = "";
    document.getElementById('omittedSeals').value = "";
    document.getElementById('newLocation').value = "";
    document.getElementById('newAsset').value = "";
    document.getElementById('newSubArea').value = "";
    document.getElementById('newSignoff').value = "";
    
    // Reset the broken asset dropdown if it exists
    const brokenSelect = document.getElementById('brokenAssetSelect');
    if (brokenSelect) brokenSelect.selectedIndex = 0;
}

function closeAddModal() {
    document.getElementById('addModal').style.display = 'none';
}

/**
 * Step 1: Generate the editable preview list
 */
function generatePreview() {
    const start = parseInt(document.getElementById('startSeal').value);
    const end = parseInt(document.getElementById('endSeal').value);
    const omittedStr = document.getElementById('omittedSeals').value;
    const omitted = omittedStr.split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));

    const commonData = {
        location: document.getElementById('newLocation').value,
        asset_name: document.getElementById('newAsset').value,
        sub_area: document.getElementById('newSubArea').value,
        inspection_date: document.getElementById('newDate').value,
        inspection_notes: document.getElementById('newNotes').value,
        signoff: document.getElementById('newSignoff').value,
        status: 'Intact'
    };

    if (isNaN(start) || isNaN(end) || start > end) {
        alert("Please enter a valid seal range.");
        return;
    }

    const previewEntries = [];
    for (let i = start; i <= end; i++) {
        if (omitted.includes(i)) continue;
        previewEntries.push({ ...commonData, seal_number: i.toString() });
    }

    closeAddModal();
    renderPreviewGrid(previewEntries);
}

/**
 * Step 2: Show generated rows in the main area for final editing
 */
function renderPreviewGrid(entries) {
    isPreviewMode = true; // Set flag
    localStorage.setItem('pendingPreview', JSON.stringify(entries)); // Save for reload

    const container = document.getElementById('main-content-area');
    container.innerHTML = `
        <div class="preview-banner">
            <h2>Review New Entries (${entries.length} rows)</h2>
            <p>You can edit any cell below before saving. These items have not been added to the database yet.</p>
            <button class="tool-btn" style="background-color: #1b5e20; color: white; padding: 10px 20px;" onclick="saveNewEntries()">Confirm & Save to Database</button>
            <button class="tool-btn" style="margin-left:10px;" onclick="discardPreview()">Cancel & Discard</button>
        </div>
        <div id="preview-rows-container"></div>
    `;

    const rowsContainer = document.getElementById('preview-rows-container');
    const originalMode = isEditMode;
    isEditMode = true; 
    renderEntries(rowsContainer, entries);
    isEditMode = originalMode;

    document.querySelectorAll('#preview-rows-container .edit-checkbox-cell').forEach(el => el.remove());
    document.querySelectorAll('#preview-rows-container .edit-only-cell').forEach(el => el.style.display = 'flex');
}

function discardPreview() {
    if (!confirm("Discard this preview?")) return;
    localStorage.removeItem('pendingPreview');
    isPreviewMode = false;
    fetchHierarchyData();
}

async function saveNewEntries() {
    const rows = document.querySelectorAll('#preview-rows-container .cell-row');
    const indicator = document.getElementById('saveIndicator');

    indicator.innerText = "Saving to Database...";

    try {
        const newRecords = Array.from(rows).map(row => {
            // UPDATED SELECTOR: Includes 'input' so Asset and Location are captured
            const inputs = row.querySelectorAll('input:not([type="checkbox"]), textarea, select');
            return {
                asset_name: inputs[0].value,
                location: inputs[1].value,
                sub_area: inputs[2].value,
                seal_number: inputs[3].value,
                inspection_date: inputs[4].value,
                signoff: inputs[5].value,
                inspection_notes: inputs[6].value,
                status: inputs[7].value,
                break_date: inputs[8].value,
                responsible_party: inputs[9].value,
                break_reason: inputs[10].value
            };
        });

        const { error } = await _supabase.from('Assets').insert(newRecords);
        if (error) throw error;

        // Success Cleanup
        localStorage.removeItem('pendingPreview');
        isPreviewMode = false;
        
        indicator.innerText = "Created Successfully";
        await fetchLookupData();
        await fetchHierarchyData();
    } catch (err) {
        console.error(err);
        alert("Operation failed. Check console for details.");
        indicator.innerText = "Error";
    }
}

window.onload = initApp;
</script>
